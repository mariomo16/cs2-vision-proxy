info:
  name: getGlobalRanking
  type: http
  seq: 3

http:
  method: GET
  url: https://open.faceit.com/data/v4/rankings/games/cs2/regions/{{region}}
  headers:
    - name: Authorization
      value: Bearer {{API_KEY}}
  params:
    - name: country
      value: es
      type: query
      disabled: true
    - name: offset
      value: "400"
      type: query
      disabled: true
    - name: limit
      value: "100"
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
