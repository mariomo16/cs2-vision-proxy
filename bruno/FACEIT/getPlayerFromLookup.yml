info:
  name: getPlayerFromLookup
  type: http
  seq: 1

http:
  method: GET
  url: https://open.faceit.com/data/v4/players?game=cs2&game_player_id={{game_player_id}}
  headers:
    - name: Authorization
      value: Bearer {{API_KEY}}
  params:
    - name: nickname
      value: mariomo16
      type: query
      disabled: true
    - name: game
      value: cs2
      type: query
    - name: game_player_id
      value: "{{game_player_id}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
