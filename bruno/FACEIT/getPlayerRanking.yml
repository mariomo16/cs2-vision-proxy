info:
  name: getPlayerRanking
  type: http
  seq: 4

http:
  method: GET
  url: https://open.faceit.com/data/v4/rankings/games/cs2/regions/{{region}}/players/{{player_id}}?limit=2
  headers:
    - name: Authorization
      value: Bearer {{API_KEY}}
  params:
    - name: limit
      value: "2"
      type: query
    - name: country
      value: ""
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
